# 鉴权模块的配置，这里配置如何签发令牌
[auth.encoder]
encoding_keys = [
    { algorithm = "HS256", form = "der_inline", kid = "key 1", key = "dGVzdDE="}
]
issue_as = "brain overflow"
audience = ["brain overflow"]
expires_in = 3600
not_valid_in = 0

# 鉴权模块的配置，这里配置如何解码令牌
[auth.decoder]
decoding_keys = [
    ["brain overflow", { algorithm = "HS256", form = "der_inline", kid = "key 1", key = "dGVzdDE=" }]
]
leeway = 60
reject_tokens_expiring_in_less_than = 0
audience = [ "brain overflow" ]

# 数据库配置
[database]
host = "localhost"
port = 5432
user = "postgres"
password = "123456"
database = "brain-overflow"


[logger]
with_file = "false"

[s3]
bucket = "brain-overflow"
access_key_id = "minioadmin"
secret_access_key = "minioadmin"
force_path_style = true
endpoint = "http://localhost:9000"

# 端口配置
[server]
port = 10086
ipv6 = false
