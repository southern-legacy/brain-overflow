version: '3.8'

networks:
  brain-overflow-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:

services:
  postgres:
    image: docker.io/library/postgres:18
    container_name: brain-overflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: brain-overflow
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./sql/ddl/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - brain-overflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: brain-overflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - brain-overflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-setup:
    image: quay.io/minio/mc
    container_name: brain-overflow-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - brain-overflow-network
    entrypoint: >
      /bin/sh -c "
      until mc alias set brainoverflow http://minio:9000 minioadmin minioadmin 2>/dev/null; do
        echo 'Waiting for MinIO to be ready...';
        sleep 2;
      done &&
      echo 'Creating bucket brain-overflow if not exists...' &&
      mc mb brainoverflow/brain-overflow --ignore-existing &&
      echo 'Bucket brain-overflow created or already exists'
      "
    restart: "no"

  brain-overflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brain-overflow-app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    volumes:
      - ./docker-compose.brain-overflow.toml:/app/brain-overflow.toml:ro
    ports:
      - "10086:10086"
    networks:
      - brain-overflow-network
    restart: unless-stopped
